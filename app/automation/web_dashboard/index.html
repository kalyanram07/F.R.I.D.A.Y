<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y Web Dashboard</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; }
        h1 { color: #58a6ff; font-weight: 300; }
        .status { margin-top: 20px; font-size: 1.2rem; color: #8b949e; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { color: #8b949e; }
            50% { color: #58a6ff; }
            100% { color: #8b949e; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>F.R.I.D.A.Y System Status</h1>
        <div class="status pulse">Awaiting Audio Input...</div>
    </div>
</body>
</html>
